name: "Main CI Pipeline"

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  push:
    branches: [main, dev, release/*, 'chore/bump-to-*']
    tags-ignore: ['*']
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  validate-pom:
    name: "🧪 Validate POM"
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # <-- added
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Validate POM
        run: |
          chmod +x ./scripts/pom-validator.sh
          xmllint --noout pom.xml || (echo "::error::Malformed XML in pom.xml"; exit 1)
          ./scripts/pom-validator.sh --strict --html
      - uses: actions/upload-artifact@v4
        name: 📈 Upload POM Report
        with:
          name: pom-validation-report
          path: Reports/pom-validation-report.html
          retention-days: 7

  build:
    name: "⚙️ Build & Test"
    needs: validate-pom
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # <-- added
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build with Maven
        run: mvn -B clean verify
      - uses: actions/upload-artifact@v4
        name: 📊 Upload Test Results
        if: always()
        continue-on-error: true
        with:
          name: test-results-${{ github.sha }}
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          retention-days: 7

  security:
    name: "🛡️ Dependency Security"
    needs: validate-pom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # <-- added
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'
      - name: Cache OWASP dependency check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-data
      - name: OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -DnvdApiKey=${{ secrets.NVD_API_KEY }}
      - name: Fast Dependency List
        run: |
          mvn dependency:list -Dsort=true -DoutputFile=dependencies.txt
          cat dependencies.txt

  quality:
    name: "✨ Code Quality"
    needs: validate-pom
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # <-- added
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'
      - name: Run Checkstyle
        run: mvn checkstyle:check
