name: "📦 Feature Branch (Fast Check)"

on:
  push:
    branches:
      - 'feature/*'
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'scripts/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/features/**'
      - '.github/releases/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-validation:
    name: "⚡ Fast PR Validation"
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # <-- added
    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4
      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'maven'
      - name: 🛠️ Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: 📝 Validate POM
        run: |
          chmod +x ./scripts/pom-validator.sh
          ./scripts/pom-validator.sh --strict
      - name: ⚙️ Compile Code
        run: mvn clean compile test-compile
